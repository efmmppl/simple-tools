<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工具箱</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans SC', 'SF Mono', 'Fira Code', 'Consolas', monospace;
  background: #f5f0e8; color: #3d3a35; line-height: 1.6;
}
.header {
  background: linear-gradient(135deg, #3d5a3d 0%, #5a7a4a 30%, #6b8f5e 60%, #3d5a3d 100%);
  text-align: center; padding: 12px 20px 10px; position: relative;
}
.header::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(circle at 20% 50%, rgba(107, 143, 94, 0.15) 0%, transparent 50%),
              radial-gradient(circle at 80% 50%, rgba(157, 187, 128, 0.1) 0%, transparent 50%);
}
.header h1 { font-size: 1.1rem; color: #e8dcc8; position: relative; }
.header p { font-size: 0.72rem; color: #d4cdbc; margin-top: 0; position: relative; }

.container { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }
.section-title { font-size: 1.15rem; margin-bottom: 16px; color: #6b8f5e; font-weight: 600; }

/* Navigation Grid */
.nav-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px; margin-bottom: 20px;
}
.nav-card {
  background: #fcfaf5; border: 1px solid rgba(107, 143, 94, 0.12);
  border-radius: 12px; padding: 28px 24px; cursor: pointer;
  transition: all 0.25s; text-align: center;
}
.nav-card:hover {
  transform: translateY(-4px); box-shadow: 0 8px 24px rgba(107, 143, 94, 0.12);
  border-color: rgba(107, 143, 94, 0.25);
}
.nav-card .nav-icon {
  font-size: 2.4rem; color: #6b8f5e; margin-bottom: 12px;
}
.nav-card .nav-name { font-size: 1.1rem; font-weight: 600; color: #3d3a35; margin-bottom: 6px; }
.nav-card .nav-desc { font-size: 0.85rem; color: #8c8273; line-height: 1.5; }

/* Tool View */
.tool-view { display: none; }
.tool-view.active { display: block; }
.back-bar {
  display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
  padding: 10px 14px; background: #fcfaf5; border: 1px solid rgba(107, 143, 94, 0.1);
  border-radius: 10px;
}
.back-btn {
  background: transparent; border: none; color: #6b8f5e; cursor: pointer;
  font-size: 0.88rem; padding: 4px 10px; border-radius: 6px; transition: all 0.2s;
}
.back-btn:hover { background: rgba(107, 143, 94, 0.08); }
.back-bar .tool-title { font-weight: 600; font-size: 0.95rem; color: #3d3a35; }

/* Cron */
.cron-input-area { margin-bottom: 24px; }
.cron-row {
  display: flex; gap: 10px; align-items: center; margin-bottom: 10px;
  padding: 12px 14px; background: #fcfaf5; border: 1px solid rgba(107, 143, 94, 0.12);
  border-radius: 10px;
}
.cron-row .num-label { font-size: 0.82rem; color: #6b6058; min-width: 48px; font-weight: 600; }
.cron-row input[type="text"] {
  flex: 1; padding: 8px 12px; border: 1px solid rgba(107, 143, 94, 0.2); border-radius: 6px;
  background: #fff; color: #3d3a35; font-size: 0.88rem; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  outline: none;
}
.cron-row input[type="text"]:focus { border-color: #6b8f5e; }
.cron-row .remove-btn {
  background: transparent; border: none; color: #b8ad9e; cursor: pointer; font-size: 1rem;
  padding: 4px 6px; border-radius: 4px; transition: all 0.2s;
}
.cron-row .remove-btn:hover { color: #b85454; background: rgba(200,80,80,0.08); }

.options-row {
  display: flex; gap: 20px; align-items: center; flex-wrap: wrap; margin-bottom: 20px;
  padding: 14px 16px; background: #fcfaf5; border: 1px solid rgba(107, 143, 94, 0.1);
  border-radius: 8px;
}
.options-row label { font-size: 0.85rem; color: #6b6058; }
.options-row select, .options-row input[type="number"] {
  padding: 6px 10px; border: 1px solid rgba(107, 143, 94, 0.2); border-radius: 6px;
  background: #fff; font-size: 0.85rem; outline: none; color: #3d3a35;
}
.options-row select:focus, .options-row input[type="number"]:focus { border-color: #6b8f5e; }
.options-row input[type="number"] { width: 70px; }

.btn {
  padding: 8px 22px; border: none; border-radius: 8px; font-size: 0.88rem; cursor: pointer;
  transition: all 0.2s; font-weight: 500;
}
.btn-primary { background: linear-gradient(135deg, #6b8f5e, #5a7a4a); color: #fff; }
.btn-primary:hover { transform: scale(1.02); box-shadow: 0 2px 10px rgba(107, 143, 94, 0.25); }
.btn-outline { background: transparent; border: 1px solid rgba(107, 143, 94, 0.3); color: #6b8f5e; }
.btn-outline:hover { background: rgba(107, 143, 94, 0.06); }
.btn-sm { padding: 5px 14px; font-size: 0.8rem; }
.btn-add { color: #6b8f5e; border: 1px dashed rgba(107, 143, 94, 0.3); background: transparent; padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
.btn-add:hover { background: rgba(107, 143, 94, 0.04); border-color: #6b8f5e; }

.result-section { margin-top: 20px; }
.result-card {
  background: #fcfaf5; border: 1px solid rgba(107, 143, 94, 0.12); border-radius: 10px;
  margin-bottom: 16px; overflow: hidden;
}
.result-card-header {
  padding: 10px 16px; font-weight: 600; font-size: 0.88rem;
  border-bottom: 1px solid rgba(107, 143, 94, 0.1);
  display: flex; justify-content: space-between; align-items: center;
}
.result-card-header .cron-expr { font-family: monospace; color: #6b8f5e; font-weight: normal; font-size: 0.82rem; }
.result-card-header .err { color: #b85454; }
.result-card-body { padding: 10px 16px; }
.time-item {
  display: flex; align-items: center; padding: 6px 0; border-bottom: 1px solid rgba(107, 143, 94, 0.05);
  font-size: 0.88rem;
}
.time-item:last-child { border-bottom: none; }
.time-item .idx { color: #b8ad9e; min-width: 30px; font-size: 0.8rem; }
.time-item .time { color: #3d3a35; font-weight: 500; }
.time-item .rel { color: #8c8273; font-size: 0.8rem; margin-left: 12px; }

.empty-state { text-align: center; padding: 40px; color: #8c8273; font-size: 0.9rem; }

.error-msg {
  background: rgba(200,80,80,0.06); border: 1px solid rgba(200,80,80,0.15);
  color: #b85454; padding: 8px 14px; border-radius: 6px; font-size: 0.85rem;
  margin-top: 8px; display: none;
}

/* Timestamp */
.ts-section { margin-bottom: 24px; }
.ts-section:last-child { margin-bottom: 0; }
.ts-card {
  background: #fcfaf5; border: 1px solid rgba(107, 143, 94, 0.12);
  border-radius: 10px; padding: 16px; margin-bottom: 16px;
}
.ts-card:last-child { margin-bottom: 0; }
.ts-card-title { font-size: 0.9rem; font-weight: 600; color: #6b8f5e; margin-bottom: 12px; }
.ts-clock {
  display: flex; gap: 24px; flex-wrap: wrap;
}
.ts-clock-item { text-align: center; }
.ts-clock-item .ts-val {
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 1.6rem; color: #3d3a35; font-weight: 600; line-height: 1.2;
}
.ts-clock-item .ts-label { font-size: 0.78rem; color: #8c8273; margin-top: 4px; }
.ts-row {
  display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  padding: 8px 0;
}
.ts-row label { font-size: 0.85rem; color: #6b6058; min-width: 80px; }
.ts-row input[type="text"], .ts-row input[type="datetime-local"] {
  flex: 1; min-width: 180px; padding: 8px 12px;
  border: 1px solid rgba(107, 143, 94, 0.2); border-radius: 6px;
  background: #fff; color: #3d3a35; font-size: 0.88rem;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  outline: none;
}
.ts-row input[type="text"]:focus, .ts-row input[type="datetime-local"]:focus {
  border-color: #6b8f5e;
}
.ts-row .ts-result {
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 0.9rem; color: #3d3a35; padding: 8px 12px;
  background: #fff; border: 1px solid rgba(107, 143, 94, 0.12);
  border-radius: 6px; min-height: 36px; flex: 1; word-break: break-all;
}
.ts-row .ts-result .hint {
  color: #b8ad9e; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 0.82rem;
}

@media (max-width: 600px) {
  .nav-grid { grid-template-columns: 1fr; }
  .cron-row { flex-wrap: wrap; }
  .cron-row input[type="text"] { min-width: 100%; }
  .ts-clock { gap: 16px; }
  .ts-clock-item .ts-val { font-size: 1.2rem; }
}
</style>
</head>
<body>

<header class="header">
  <h1><i class="fas fa-tools" style="color:#e8dcc8;margin-right:8px"></i> 工具箱</h1>
  <p>实用离线工具</p>
</header>

<div class="container">

  <!-- Navigation -->
  <div id="navView" class="nav-grid">
    <div class="nav-card" data-tool="cron">
      <div class="nav-icon"><i class="far fa-clock"></i></div>
      <div class="nav-name">Cron 解析器</div>
      <div class="nav-desc">解析 Quartz Cron 表达式<br>预览未来执行时间</div>
    </div>
    <div class="nav-card" data-tool="timestamp">
      <div class="nav-icon"><i class="fas fa-exchange-alt"></i></div>
      <div class="nav-name">时间戳工具</div>
      <div class="nav-desc">获取当前时间戳<br>时间戳与日期互转</div>
    </div>
  </div>

  <!-- Cron -->
  <div id="tool-cron" class="tool-view">
    <div class="back-bar">
      <button class="back-btn" data-tool="cron"><i class="fas fa-arrow-left"></i> 返回</button>
      <span class="tool-title"><i class="far fa-clock" style="margin-right:6px;color:#6b8f5e"></i> Cron 解析器</span>
    </div>
    <div class="cron-input-area" id="cronArea">
      <div class="section-title"><i class="fas fa-terminal" style="margin-right:6px"></i> Cron 表达式</div>
      <div id="cronList"></div>
      <button class="btn-add" id="addCronBtn"><i class="fas fa-plus"></i> 添加表达式</button>
    </div>
    <div class="options-row">
      <label><i class="fas fa-list-ol" style="margin-right:4px;color:#6b8f5e"></i> 显示时间点数量：</label>
      <input type="number" id="countSelect" value="5" min="1" max="50">
      <label style="margin-left:8px">
        <input type="checkbox" id="showRelative" checked>
        <span style="margin-left:4px">显示相对时间</span>
      </label>
      <button class="btn btn-primary" id="parseBtn"><i class="fas fa-play"></i> 解析</button>
    </div>
    <div class="error-msg" id="errorMsg"></div>
    <div class="result-section" id="resultArea">
      <div class="empty-state"><i class="far fa-hourglass" style="font-size:2rem;display:block;margin-bottom:8px;color:#d4cdbc"></i>输入 Cron 表达式后点击"解析"</div>
    </div>
  </div>

  <!-- Timestamp -->
  <div id="tool-timestamp" class="tool-view">
    <div class="back-bar">
      <button class="back-btn" data-tool="timestamp"><i class="fas fa-arrow-left"></i> 返回</button>
      <span class="tool-title"><i class="fas fa-exchange-alt" style="margin-right:6px;color:#6b8f5e"></i> 时间戳工具</span>
    </div>
    <div class="ts-section">
      <div class="ts-card">
        <div class="ts-card-title"><i class="fas fa-clock" style="margin-right:6px"></i> 当前时间戳</div>
        <div class="ts-clock">
          <div class="ts-clock-item">
            <div class="ts-val" id="tsNowSec">0</div>
            <div class="ts-label">秒 (Unix)</div>
          </div>
          <div class="ts-clock-item">
            <div class="ts-val" id="tsNowMs">0</div>
            <div class="ts-label">毫秒</div>
          </div>
          <div class="ts-clock-item">
            <div class="ts-val" id="tsNowDate" style="font-size:1rem">-</div>
            <div class="ts-label">本地时间</div>
          </div>
        </div>
      </div>
    </div>
    <div class="ts-section">
      <div class="ts-card">
        <div class="ts-card-title"><i class="fas fa-exchange-alt" style="margin-right:6px"></i> 时间戳 → 日期</div>
        <div class="ts-row">
          <label>时间戳</label>
          <input type="text" id="tsToDateInput" placeholder="输入秒或毫秒时间戳" value="0">
          <button class="btn btn-primary btn-sm" id="tsToDateBtn">转换</button>
        </div>
        <div class="ts-row">
          <label>结果</label>
          <div class="ts-result" id="tsToDateResult"><span class="hint">点击"转换"查看日期</span></div>
        </div>
      </div>
    </div>
    <div class="ts-section">
      <div class="ts-card">
        <div class="ts-card-title"><i class="fas fa-exchange-alt" style="margin-right:6px"></i> 日期 → 时间戳</div>
        <div class="ts-row">
          <label>日期时间</label>
          <input type="datetime-local" id="tsFromDateInput">
          <button class="btn btn-primary btn-sm" id="tsFromDateBtn">转换</button>
        </div>
        <div class="ts-row">
          <label>秒</label>
          <div class="ts-result" id="tsFromDateSec"><span class="hint">点击"转换"获取时间戳</span></div>
          <button class="btn btn-outline btn-sm ts-copy" data-target="tsFromDateSec" title="复制"><i class="fas fa-copy"></i></button>
        </div>
        <div class="ts-row">
          <label>毫秒</label>
          <div class="ts-result" id="tsFromDateMs"><span class="hint">点击"转换"获取时间戳</span></div>
          <button class="btn btn-outline btn-sm ts-copy" data-target="tsFromDateMs" title="复制"><i class="fas fa-copy"></i></button>
        </div>
      </div>
    </div>
  </div>

</div>

<footer style="text-align:center;padding:24px 20px;color:#8c8273;font-size:0.82rem;border-top:1px solid rgba(107,143,94,.08)">
  <span id="footerClock"></span>
</footer>

<script>
// ===== Navigation =====
function showNav() {
  document.getElementById('navView').style.display = 'grid';
  document.querySelectorAll('.tool-view.active').forEach(v => v.classList.remove('active'));
}

function showTool(name) {
  document.getElementById('navView').style.display = 'none';
  document.querySelectorAll('.tool-view').forEach(v => v.classList.remove('active'));
  document.getElementById('tool-' + name).classList.add('active');
}

document.querySelectorAll('.nav-card').forEach(card => {
  card.addEventListener('click', () => showTool(card.dataset.tool));
});
document.querySelectorAll('.back-btn').forEach(btn => {
  btn.addEventListener('click', showNav);
});

// ===== Quartz Cron Parser =====
const MONTH_MAP = { JAN:1,FEB:2,MAR:3,APR:4,MAY:5,JUN:6,JUL:7,AUG:8,SEP:9,OCT:10,NOV:11,DEC:12 };
const DOW_MAP = { SUN:0,MON:1,TUE:2,WED:3,THU:4,FRI:5,SAT:6 };

function parseField(field, min, max, nameMap) {
  const set = new Set();
  const parts = field.split(',');
  for (let part of parts) {
    part = part.trim().toUpperCase();
    if (part === '*' || part === '?') { for (let i = min; i <= max; i++) set.add(i); continue; }
    let step = 1;
    if (part.includes('/')) {
      const [rangeStr, stepStr] = part.split('/');
      step = parseInt(stepStr);
      if (isNaN(step) || step < 1) throw new Error(`步进值无效: ${stepStr}`);
      if (rangeStr === '*') {
        for (let i = min; i <= max; i += step) set.add(i);
      } else {
        const [rmin, rmax] = rangeStr.split('-').map(s => {
          const n = nameMap ? (nameMap[s.trim()] ?? parseInt(s.trim())) : parseInt(s.trim());
          if (isNaN(n)) throw new Error(`无法解析: ${s}`);
          return n;
        });
        for (let i = rmin; i <= (rmax || max); i += step) set.add(i);
      }
      continue;
    }
    if (part.includes('-')) {
      const [a, b] = part.split('-').map(s => {
        const n = nameMap ? (nameMap[s.trim()] ?? parseInt(s.trim())) : parseInt(s.trim());
        if (isNaN(n)) throw new Error(`无法解析: ${s}`);
        return n;
      });
      for (let i = a; i <= b; i++) set.add(i);
      continue;
    }
    const n = nameMap ? (nameMap[part] ?? parseInt(part)) : parseInt(part);
    if (isNaN(n)) throw new Error(`无法解析: ${part}`);
    if (n < min || n > max) throw new Error(`${n} 超出范围 [${min}, ${max}]`);
    set.add(n);
  }
  return [...set].sort((a,b)=>a-b);
}

function parseQuartzCron(expr) {
  const parts = expr.trim().split(/\s+/);
  if (parts.length < 6 || parts.length > 7) throw new Error(`需要 6~7 个字段，当前 ${parts.length} 个`);
  const sec = parseField(parts[0], 0, 59);
  const min = parseField(parts[1], 0, 59);
  const hour = parseField(parts[2], 0, 23);
  const day = parseField(parts[3], 1, 31);
  const month = parseField(parts[4], 1, 12, MONTH_MAP);
  const dow = parseField(parts[5], 0, 6, DOW_MAP);
  const year = parts[6] ? parseField(parts[6], 1970, 2099) : null;
  return { sec, min, hour, day, month, dow, year };
}

function getNextTimes(fields, count, from) {
  const results = [];
  let current = new Date(from);
  if (current.getTime() < Date.now()) current = new Date();
  current.setSeconds(0, 0);
  let maxLoops = 1000000;
  while (results.length < count && maxLoops-- > 0) {
    const y = current.getFullYear();
    const m = current.getMonth() + 1;
    const d = current.getDate();
    const h = current.getHours();
    const mi = current.getMinutes();
    const s = current.getSeconds();
    if (fields.year && !fields.year.includes(y)) { current.setFullYear(y + 1); current.setMonth(0, 1); current.setHours(0, 0, 0, 0); continue; }
    if (!fields.month.includes(m)) { current.setMonth(m, 1); current.setHours(0, 0, 0, 0); continue; }
    if (!fields.day.includes(d)) { current.setDate(d + 1); current.setHours(0, 0, 0, 0); continue; }
    const wd = current.getDay();
    if (!fields.dow.includes(wd)) { current.setDate(d + 1); current.setHours(0, 0, 0, 0); continue; }
    if (!fields.hour.includes(h)) { current.setHours(h + 1, 0, 0, 0); continue; }
    if (!fields.min.includes(mi)) { current.setMinutes(mi + 1, 0, 0); continue; }
    if (!fields.sec.includes(s)) { current.setSeconds(s + 1, 0); continue; }
    results.push(new Date(current));
    current.setSeconds(current.getSeconds() + 1);
  }
  if (maxLoops <= 0) throw new Error('未找到匹配的时间点，请检查表达式');
  return results;
}

function parseAndCompute(expr, count) {
  const fields = parseQuartzCron(expr);
  return getNextTimes(fields, count, new Date());
}

let cronCount = 1;
const MAX_CRONS = 3;

function renderInputs() {
  const list = document.getElementById('cronList');
  const prev = [];
  for (let i = 0; i < cronCount; i++) {
    const el = document.getElementById(`cronInput${i}`);
    prev[i] = el ? el.value : '';
  }
  const examples = ['0 0 9 * * ?', '0 0/15 * * * ?', '0 0 0 1 * ?'];
  let html = '';
  for (let i = 0; i < cronCount; i++) {
    const val = prev[i] || (i === 0 ? '0 0 9 * * ?' : '');
    html += `<div class="cron-row" data-idx="${i}">
      <span class="num-label">#${i+1}</span>
      <input type="text" id="cronInput${i}" placeholder="例: ${examples[i] || ''}" spellcheck="false" value="${val.replace(/"/g,'&quot;')}">
      ${cronCount > 1 ? `<button class="remove-btn" onclick="removeCron(${i})"><i class="fas fa-times"></i></button>` : ''}
    </div>`;
  }
  list.innerHTML = html;
  document.getElementById('addCronBtn').style.display = cronCount >= MAX_CRONS ? 'none' : '';
}

function addCron() {
  if (cronCount >= MAX_CRONS) return;
  cronCount++;
  renderInputs();
}

function removeCron(idx) {
  if (cronCount <= 1) return;
  cronCount--;
  renderInputs();
}

document.getElementById('addCronBtn').addEventListener('click', addCron);

function formatTime(d) {
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

function relativeTime(d) {
  const diff = d.getTime() - Date.now();
  if (diff < 0) return '已过去';
  const s = Math.floor(diff / 1000);
  if (s < 60) return `${s} 秒后`;
  const m = Math.floor(s / 60);
  if (m < 60) return `${m} 分 ${s % 60} 秒后`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h} 时 ${m % 60} 分后`;
  const day = Math.floor(h / 24);
  return `${day} 天 ${h % 24} 时后`;
}

function parseAll() {
  const errorMsg = document.getElementById('errorMsg');
  errorMsg.style.display = 'none';
  const count = parseInt(document.getElementById('countSelect').value) || 5;
  const showRel = document.getElementById('showRelative').checked;
  const entries = [];
  let hasError = false;
  for (let i = 0; i < cronCount; i++) {
    const input = document.getElementById(`cronInput${i}`);
    const expr = input.value.trim();
    if (!expr) continue;
    try {
      const times = parseAndCompute(expr, count);
      times.forEach(t => entries.push({ expr, time: t, label: `#${i+1}` }));
    } catch (e) {
      hasError = true;
      errorMsg.textContent += `#${i+1} ${expr}: ${e.message}\n`;
    }
  }
  if (hasError) errorMsg.style.display = 'block';
  const area = document.getElementById('resultArea');
  if (entries.length === 0) {
    area.innerHTML = `<div class="empty-state"><i class="far fa-hourglass" style="font-size:2rem;display:block;margin-bottom:8px;color:#d4cdbc"></i>无有效时间点</div>`;
    return;
  }
  entries.sort((a, b) => a.time - b.time);
  const seen = new Set();
  const merged = [];
  for (const e of entries) {
    const key = e.time.getTime();
    if (seen.has(key)) {
      const last = merged[merged.length - 1];
      if (last && last.time.getTime() === key) last.labels.push(e.label);
    } else {
      seen.add(key);
      merged.push({ time: e.time, labels: [e.label] });
    }
  }
  let html = `<div class="result-card">
    <div class="result-card-header" style="justify-content:space-between">
      <span><i class="fas fa-list"></i> 未来执行时间线</span>
      <span style="font-size:0.8rem;color:#8c8273">共 ${merged.length} 个时间点</span>
    </div>
    <div class="result-card-body">`;
  merged.forEach((m, i) => {
    const badges = [...new Set(m.labels)].map(l => `<span style="display:inline-block;padding:0 6px;border-radius:4px;font-size:0.7rem;background:rgba(107,143,94,0.12);color:#6b8f5e;margin-right:3px">${l}</span>`).join('');
    html += `<div class="time-item">
      <span class="idx">#${i+1}</span>
      <span class="time">${formatTime(m.time)}</span>
      ${badges}
      ${showRel ? `<span class="rel">${relativeTime(m.time)}</span>` : ''}
    </div>`;
  });
  html += `</div></div>`;
  area.innerHTML = html;
}

document.getElementById('parseBtn').addEventListener('click', parseAll);
document.getElementById('cronInput0')?.addEventListener('keydown', e => { if (e.key === 'Enter') parseAll(); });

renderInputs();

// ===== Footer Clock =====
function updateFooterClock() {
  const now = new Date();
  const date = now.toLocaleDateString('zh-CN');
  const time = now.toLocaleTimeString('zh-CN', { hour12: false });
  const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
  document.getElementById('footerClock').textContent = `${date} ${time} · ${tz}`;
}
updateFooterClock();
setInterval(updateFooterClock, 1000);

// ===== Timestamp Tool =====
function pad2(n) { return String(n).padStart(2, '0'); }
function formatDate(d) {
  return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())} ${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;
}

function updateClock() {
  const now = Date.now();
  document.getElementById('tsNowSec').textContent = Math.floor(now / 1000);
  document.getElementById('tsNowMs').textContent = now;
  document.getElementById('tsNowDate').textContent = formatDate(new Date());
}
updateClock();
setInterval(updateClock, 100);

document.getElementById('tsToDateInput').value = Math.floor(Date.now() / 1000);
document.getElementById('tsToDateInput').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('tsToDateBtn').click(); });

document.getElementById('tsToDateBtn').addEventListener('click', () => {
  const input = document.getElementById('tsToDateInput').value.trim();
  const result = document.getElementById('tsToDateResult');
  const ts = Number(input);
  if (isNaN(ts) || input === '') {
    result.innerHTML = '<span style="color:#b85454">请输入有效数字</span>';
    return;
  }
  const ms = ts > 1e11 ? ts : ts * 1000;
  const d = new Date(ms);
  if (isNaN(d.getTime())) {
    result.innerHTML = '<span style="color:#b85454">无效时间戳</span>';
    return;
  }
  result.textContent = formatDate(d) + ' (UTC' + (d.getTimezoneOffset() === 0 ? '+0' : (d.getTimezoneOffset() > 0 ? '-' : '+') + Math.abs(d.getTimezoneOffset() / 60)) + ')';
});

document.getElementById('tsFromDateBtn').addEventListener('click', () => {
  const input = document.getElementById('tsFromDateInput').value;
  const secEl = document.getElementById('tsFromDateSec');
  const msEl = document.getElementById('tsFromDateMs');
  if (!input) {
    secEl.innerHTML = '<span style="color:#b85454">请选择日期时间</span>';
    msEl.innerHTML = '<span style="color:#b85454">请选择日期时间</span>';
    return;
  }
  const d = new Date(input);
  if (isNaN(d.getTime())) {
    secEl.innerHTML = '<span style="color:#b85454">无效日期</span>';
    msEl.innerHTML = '<span style="color:#b85454">无效日期</span>';
    return;
  }
  const ms = d.getTime();
  secEl.textContent = Math.floor(ms / 1000);
  msEl.textContent = ms;
});

document.getElementById('tsFromDateInput').value = formatDate(new Date()).slice(0, 16);
document.getElementById('tsToDateBtn').click();
document.getElementById('tsFromDateBtn').click();

document.querySelectorAll('.ts-copy').forEach(btn => {
  btn.addEventListener('click', () => {
    const target = document.getElementById(btn.dataset.target);
    const text = target.textContent;
    if (!text || text.startsWith('请') || text.startsWith('点击')) return;
    navigator.clipboard.writeText(text).then(() => {
      const icon = btn.querySelector('i');
      icon.className = 'fas fa-check';
      setTimeout(() => { icon.className = 'fas fa-copy'; }, 1500);
    });
  });
});
</script>
