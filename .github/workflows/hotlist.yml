name: 热榜数据更新

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-hotlist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: 抓取热榜数据
        run: node scripts/fetch-hotlist.js
      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add hotlist.json
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: 更新热榜数据 [skip ci]"
          git push
