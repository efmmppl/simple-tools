# 工作流名称：每天早上定时抓取热榜数据并提交到仓库
name: 热榜数据更新

on:
  # 定时触发：每天 UTC 22:00（北京时间次日 6:00，预留延迟缓冲）
  schedule:
    - cron: '0 22 * * *'
  # 支持手动触发
  workflow_dispatch:

permissions:
  # 赋予向仓库写入的权限（用于提交 hotlist.json）
  contents: write

jobs:
  fetch-hotlist:
    runs-on: ubuntu-latest
    steps:
      # 检出仓库代码
      - uses: actions/checkout@v4
      # 安装 Node.js 20
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # 执行抓取脚本，生成 hotlist.json
      - name: 抓取热榜数据
        run: node scripts/fetch-hotlist.js
      # 提交 hotlist.json 到仓库并推送
      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add hotlist.json
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: 更新热榜数据 [skip ci]"
          git push
